<!DOCTYPE html>
<html>
<head>
    <title>Test Hybrid Architecture</title>
</head>
<body>
    <h1>Testing Hybrid Architecture</h1>
    <div id="result"></div>
    
    <script>
        async function testConnection() {
            const result = document.getElementById('result');
            
            try {
                // Test direct connection to backend
                const response = await fetch('https://31.97.128.225:3443/health');
                const data = await response.json();
                
                result.innerHTML = `
                    <p style="color: green;">✅ SUCCESS: Direct backend connection working!</p>
                    <p>Backend response: ${JSON.stringify(data)}</p>
                    <p>The hybrid architecture is functional:</p>
                    <ul>
                        <li>GUI served by Cloudflare Workers ✅</li>
                        <li>API calls to backend server ✅</li>
                        <li>HTTPS connection working ✅</li>
                    </ul>
                `;
            } catch (error) {
                result.innerHTML = `
                    <p style="color: red;">❌ ERROR: ${error.message}</p>
                    <p>This could be due to:</p>
                    <ul>
                        <li>CORS restrictions</li>
                        <li>SSL certificate issues</li>
                        <li>Network connectivity</li>
                    </ul>
                `;
            }
        }
        
        // Run test on page load
        testConnection();
    </script>
</body>
</html>
